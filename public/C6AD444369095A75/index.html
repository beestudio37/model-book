<!doctype html><html lang="ja"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>今月のModel Book</title>
<style>
:root { --bg:#ffffff; --text:#111; --accent:#39bff0; --line:#e5eef5; --panel:#f7fcff; --good:#eaf9f0; --bad:#fff0f0; --pink-bg:#fff7fb; --pink-accent:#ffb6d5; }
body { margin:0; background:#fafafa; color:var(--text); font-family:"Hiragino Sans","Noto Sans JP",sans-serif; line-height:1.7; }
.container { max-width:1100px; margin:0 auto; padding:24px 16px 48px; }
h1 { margin:0 0 16px; font-size:32px; border-bottom:1px solid #e5e7eb; color:#111; letter-spacing:0.06em; padding-bottom:10px; } h1::before { content:'bee studio'; display:block; font-size:12px; letter-spacing:0.28em; color:#6b7280; margin-bottom:6px; }
h2 { margin:30px 0 10px; font-size:18px; color:#111; padding:10px 12px; border:1px solid #e5e7eb; border-radius:14px; background:#fff; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:12px; }
.card { background:#fff; border:1px solid #e5e7eb; border-left:4px solid #f4c542; border-radius:16px; padding:16px; box-shadow:none; }.card.good { border-left-color:#111; background:#fafafa; } .card.bad { border-left-color:#d1d5db; background:#fff; }
.label { font-size:12px; color:#8a6473; } .value { font-size:clamp(18px,2.0vw,26px); font-weight:700; color:#33232b; white-space:nowrap; overflow:visible; line-height:1.15; letter-spacing:-0.01em; }
.table-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:8px; } table { width:100%; border-collapse:collapse; font-size:14px; }
th,td { text-align:left; border-bottom:1px solid var(--line); padding:10px 8px; white-space:nowrap; } th { background:#ebf9ff; font-weight:600; }
.table-wrap table tr:hover { background:#f4fbff; }
.row-good { background:var(--good); } .row-bad { background:var(--bad); } .alert { border:1px solid #ffe1ee; background:#fffafd; color:#4a3440; border-radius:18px; padding:10px; margin:8px 0; box-shadow:0 3px 8px rgba(255,182,213,0.12); } .alert pre { white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
.alert.neutral { border-color:var(--line); background:#f8fcff; color:var(--text); }
.section-good { border-color:#bfe8cc; background:#f3fcf6; color:#1f5f35; }
.section-trend { border-color:#b7d9f4; background:#f3f9ff; color:#234c73; }
.section-alert { border-color:#f3c2c2; background:#fff6f6; color:#8f1f1f; }
.section-score { border-color:#f1de9f; background:#fffaf0; color:#6d5300; }
details.fold { border:1px solid var(--line); border-radius:10px; margin:10px 0; background:#fff; }
details.fold > summary { cursor:pointer; list-style:none; font-weight:700; padding:10px 12px; border-bottom:1px solid var(--line); }
details.fold[open] > summary { background:#f7fbff; }
details.fold > summary::-webkit-details-marker { display:none; }
details.fold .fold-body { padding:10px; }
.score-top3 { border-left-width:8px; background:#fff7df; }
.score-rank-lg { font-size:20px; font-weight:800; }
.status-unhandled { background:#fff0f0; color:#b42318; font-weight:700; }
.status-progress { background:#fff8e6; color:#9a6700; font-weight:700; }
.status-done { background:#ecfdf3; color:#067647; font-weight:700; }
.status-watch { background:#eef4ff; color:#175cd3; font-weight:700; }
.type-ace { background:#ffe8cc; color:#9a4d00; font-weight:700; }
.type-work { background:#ffe8e8; color:#b42318; font-weight:700; }
.type-potential { background:#e8f6ff; color:#175cd3; font-weight:700; }
.type-stable { background:#eef4ff; color:#344054; font-weight:700; }
.pri-high { color:#d64545; font-weight:700; }
.pri-mid { color:#c88a00; font-weight:700; }
.pri-low { color:#5c6f82; font-weight:700; }
.pri-watch { color:#64748b; background:#eef2f7; font-weight:700; }
.outcome-good { color:#1f7a1f; font-weight:700; background:#ecfdf3; }
.outcome-mid { color:#9a6700; font-weight:700; background:#fff8e6; }
.outcome-bad { color:#b42318; font-weight:700; background:#fff0f0; }
.outcome-wait { color:#475467; font-weight:700; background:#f2f4f7; }
.history-button { border:1px solid #d0deea; background:#f7fcff; color:#234c73; border-radius:8px; padding:6px 10px; cursor:pointer; font-weight:700; }
.history-button:hover { background:#eef7ff; }
.history-box { margin-top:8px; border:1px solid #dbe7f1; border-radius:8px; padding:8px; background:#fbfdff; min-width:260px; }
.history-item { border-bottom:1px dashed #dbe7f1; padding:6px 0; }
.trend-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; margin:10px 0 14px; }
.trend-panel { border:1px solid var(--line); border-radius:10px; background:#fff; padding:12px; box-shadow:0 1px 3px rgba(16,24,40,0.04); }
.trend-panel h3 { margin:0 0 8px; font-size:15px; color:#21435f; }
.chart-shell { width:100%; overflow-x:auto; }
.chart-meta { font-size:12px; color:#5f6f7f; margin-top:8px; line-height:1.6; }
.chart-meta span { display:inline-block; margin-right:10px; }
.chart-empty { padding:16px 8px; color:#6b7c8a; }
.monthly-compare-grid { display:grid; gap:10px; }
.monthly-compare-card { border:1px solid #dbe7f1; border-radius:10px; padding:10px; background:#fbfdff; }
.monthly-compare-card h4 { margin:0 0 8px; font-size:14px; color:#1f4e79; }
.monthly-group-title { font-size:12px; font-weight:700; color:#4d5f73; margin:8px 0 4px; }
.monthly-group-block { display:grid; gap:4px; }
.compare-bar-track { width:100%; height:10px; background:#eef4f9; border-radius:999px; overflow:hidden; margin-top:4px; }
.compare-bar-fill { height:100%; border-radius:999px; }
.compare-row { display:grid; grid-template-columns:96px 1fr auto; gap:8px; align-items:center; margin-top:6px; font-size:12px; }
.compare-row .metric-label { color:#556575; font-weight:600; }
.compare-row .metric-value { color:#203040; font-weight:700; }
.daily-trend-scroll { overflow-x:auto; padding-bottom:4px; }
.daily-chart-caption { font-size:12px; color:#66788a; margin-top:6px; }
@media (max-width: 640px) { .compare-row { grid-template-columns:72px 1fr auto; } .trend-panel { padding:10px; } }
.history-item:last-child { border-bottom:none; }
.history-empty { color:#94a3b8; }
.age-normal { background:#ffffff; color:#334155; font-weight:700; }
.age-mid { background:#fff8e6; color:#9a6700; font-weight:700; }
.age-long { background:#fff0f0; color:#b42318; font-weight:700; }
.memo-space { background:#ffffff; border:1px dashed #e7d6df; border-radius:12px; min-height:56px; margin:6px 0 12px; }
.memo-input { width:100%; min-height:92px; box-sizing:border-box; resize:vertical; background:#ffffff; border:1px dashed #e7d6df; border-radius:12px; padding:10px 12px; color:#4a3440; font:inherit; line-height:1.6; margin:6px 0 12px; }
.memo-controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:8px 0 14px; }
.memo-status { color:#6b4f5a; font-size:13px; }
.interview-block { background:#fffafd; border:1px solid #ffe1ee; border-radius:16px; padding:14px 16px; }
.interview-item { margin:0 0 14px; }
.interview-title { color:#6b4f5a; font-weight:700; margin-bottom:6px; }
.interview-line { min-height:72px; background:#ffffff; border:1px solid #f0d9e4; border-radius:10px; }
.toggle-button { background:#111; color:#fff; border:1px solid #111; border-radius:999px; padding:9px 18px; font-weight:700; cursor:pointer; box-shadow:none; }
.toggle-button:hover { background:#2a2a2a; }
.red-rate { color:#d64545; font-weight:700; }
.yellow-rate { color:#c88a00; font-weight:700; }
.green-rate { color:#1f7a1f; font-weight:700; }
.nowrap { white-space: nowrap; }
.karte-subtitle { color:#8a6473; margin:-6px 0 18px; font-size:14px; }
.subvalue { font-size:13px; color:#8a6473; margin-top:4px; }

@media print {
  @page { size: A4 portrait; margin: 12mm 11mm 12mm 11mm; }
  body { background:#fff !important; color:#221a1f !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .container { max-width:none; margin:0; padding:0; }
  a { color:inherit !important; text-decoration:none !important; }
  .table-wrap table tr:hover { background:transparent !important; }
  .toggle-button, details.fold > summary { display:none !important; }
  .alert, .card, .interview-block, .history-box { background:#fff !important; border-color:#e5e7eb !important; box-shadow:none !important; }
  .section-good { background:#fafafa !important; border-color:#e5e7eb !important; }
  .section-trend { background:#fafafa !important; border-color:#e5e7eb !important; }
  .section-alert { background:#fafafa !important; border-color:#e5e7eb !important; }
  .section-score { background:#fffbe6 !important; border-color:#f4c542 !important; }
  .memo-space, .interview-line { min-height:90px !important; background:#fff !important; border-color:#e5e7eb !important; }
  .memo-input { min-height:110px !important; background:#fff !important; border-color:#e5e7eb !important; }
  .interview-item { break-inside: avoid; page-break-inside: avoid; }
  .print-keep { break-inside: avoid; page-break-inside: avoid; }
  .print-priority { break-before: avoid; page-break-before: avoid; }
  .print-badge { display:block !important; position:absolute; top:0; right:0; font-size:11px; color:#111; border:1px solid #f4c542; padding:2px 8px; border-radius:999px; background:#fffdf0; }
}

</style>
<script>
function toggleHistory(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
}
</script>
</head><body><div id="page-top"></div><div class="container"><h1>今月のModel Book</h1><div class='alert neutral'>今月見えてきた魅力と、これから一緒に試してみたいことをまとめました。</div><div style='margin-top:16px;'><a class='btn' href='latest.html'>今月のModel Bookを開く</a></div></div></body></html>
